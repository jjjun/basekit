name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Run tests
        run: uv run pytest
