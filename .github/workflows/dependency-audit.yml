name: Dependency audit

on:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --all-extras --dev --locked
      - run: uv run pip-audit
